name: docmind

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docmind}
      POSTGRES_USER: ${POSTGRES_USER:-docmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmind-local-password}
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-docmind}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-docmind-local-secret}
    ports:
      - "${MINIO_PORT_HOST:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_HOST:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-docmind}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-docmind-local-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}
      && mc mb --ignore-existing local/$${MINIO_BUCKET}"
    restart: "no"

  migrate:
    build:
      context: ./backend
    command: alembic upgrade head
    environment: &backend-environment
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-DocMind}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      POSTGRES_DB: ${POSTGRES_DB:-docmind}
      POSTGRES_USER: ${POSTGRES_USER:-docmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docmind-local-password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-docmind}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-docmind-local-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      MINIO_SECURE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
    environment: *backend-environment
    ports:
      - "${BACKEND_PORT_HOST:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    command: arq app.workers.settings.WorkerSettings
    environment: *backend-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
      VITE_CACHE_DIR: /tmp/docmind-vite-cache
    ports:
      - "${FRONTEND_PORT_HOST:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
